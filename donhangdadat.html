<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Đơn Hàng Đã Đặt - Cửa Hàng Laptop</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        background-color: #ffffff;
        margin: 0;
        padding: 0;
        color: #333;
      }

      header {
        background-color: #c40000;
        color: white;
        text-align: center;
        padding: 20px 0;
        font-size: 24px;
        font-weight: bold;
      }

      .container {
        width: 90%;
        margin: 30px auto;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        margin-bottom: 30px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      }

      th {
        background-color: #e60000;
        color: white;
        padding: 12px;
        text-align: center;
      }

      td {
        border-bottom: 1px solid #ddd;
        padding: 12px;
        text-align: center;
      }

      img {
        width: 80px;
        border-radius: 8px;
      }

      tr:hover {
        background-color: #fff0f0;
      }

      .status {
        font-weight: bold;
        padding: 6px 12px;
        border-radius: 6px;
        color: white;
      }

      .dang-giao {
        background-color: orange;
      }

      .da-giao {
        background-color: green;
      }

      .da-huy {
        background-color: red;
      }

      .btn-detail {
        background-color: #c40000;
        color: white;
        border: none;
        padding: 8px 16px;
        border-radius: 6px;
        cursor: pointer;
      }

      .btn-detail:hover {
        background-color: #a00000;
      }
    </style>
  </head>
  <body>
    <header>🧾 Đơn Hàng Đã Đặt</header>

    <div class="container">
      <table>
        <tr>
          <th>Mã đơn hàng</th>
          <th>Sản phẩm</th>
          <th>Ngày đặt</th>
          <th>Tổng tiền</th>
          <th>Trạng thái</th>
          <th>Thao tác</th>
        </tr>

        <tr>
          <td>#DH001</td>
          <td>
            <img src="sp1.jpg" alt="Laptop 1" /><br />
            Laptop Dell Inspiron 15
          </td>
          <td>05/10/2025</td>
          <td>18.000.000₫</td>
          <td><span class="status dang-giao">Đang giao</span></td>
          <td>
            <button
              class="btn-detail"
              onclick="alert('Xem chi tiết đơn #DH001')"
            >
              Xem chi tiết
            </button>
          </td>
        </tr>

        <tr>
          <td>#DH002</td>
          <td>
            <img src="sp2.jpg" alt="Laptop 2" /><br />
            Laptop Asus Vivobook X
          </td>
          <td>20/09/2025</td>
          <td>16.500.000₫</td>
          <td><span class="status da-giao">Đã giao</span></td>
          <td>
            <button
              class="btn-detail"
              onclick="alert('Xem chi tiết đơn #DH002')"
            >
              Xem chi tiết
            </button>
          </td>
        </tr>

        <tr>
          <td>#DH003</td>
          <td>
            <img src="sp3.jpg" alt="Laptop 3" /><br />
            Laptop HP Pavilion
          </td>
          <td>12/08/2025</td>
          <td>20.000.000₫</td>
          <td><span class="status da-huy">Đã hủy</span></td>
          <td>
            <button
              class="btn-detail"
              onclick="alert('Xem chi tiết đơn #DH003')"
            >
              Xem chi tiết
            </button>
          </td>
        </tr>
      </table>
    </div>
  </body>
</html>
