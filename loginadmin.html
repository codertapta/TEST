<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Đăng nhập - Muit Store Admin</title>
    <link rel="stylesheet" href="login.css" />
  </head>
  <body>
    <div class="container">
      <div class="left">
        <h2>Hello Admin</h2>
        <p>Đăng nhập để truy cập hệ thống quản trị</p>
      </div>
      <div class="right">
        <h2>Đăng nhập admin</h2>

        <!-- Thêm form id="loginForm" -->
        <form id="loginForm">
          <div class="input_box">
            <input type="email" placeholder="Email" required />
          </div>
          <div class="input_box">
            <input type="password" placeholder="Mật khẩu" required />
          </div>
          <div class="check">
            <input type="checkbox" id="remember" />
            <label for="remember">Lưu đăng nhập</label>
          </div>
          <button type="submit" class="login">Đăng nhập</button>
        </form>
      </div>
    </div>

    <script>
      document
        .getElementById("loginForm")
        .addEventListener("submit", function (e) {
          e.preventDefault();

          const email = document.querySelector('input[type="email"]').value;
          const password = document.querySelector(
            'input[type="password"]'
          ).value;

          // Giả lập thông tin đăng nhập
          if (email === "phatt0404@gmail.com" && password === "Tanphat1609@") {
            window.location.href = "index.html"; // Đăng nhập thành công
          } else {
            alert("Sai email hoặc mật khẩu!");
          }
        });
    </script>
  </body>
</html>
